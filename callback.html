<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #111; color: #0f0; }
    #code { font-size: 1.2em; word-break: break-all; background: #222; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Código de autorização TikTok</h2>
  <div id="code">Aguardando...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    document.getElementById('code').textContent = code
      ? 'CODE: ' + code
      : 'Nenhum código encontrado na URL.';
  </script>
</body>
</html>
